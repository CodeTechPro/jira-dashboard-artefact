  { name: "Story", plural: "Stories", cls: "story" },
  { name: "Task",  plural: "Tasks",   cls: "task"  },
  { name: "Bug",   plural: "Bugs",    cls: "bug"   },
];

const state = {
  projects: [],
  selectedKeys: new Set(),
  data: new Map(),
  isFetching: false,
  fetchQueue: [],
  currentFetchingKey: null,
  searchTerm: "",
};

const $ = (id) => root.getElementById(id);
function firstSelectedProject(){ for (const p of state.projects) if (state.selectedKeys.has(p.key)) return p; return null; }
function syncContext(){ const p = firstSelectedProject(); if (p) { if (shell && shell.setProjectContext) shell.setProjectContext(p.key, p.name); } else if (shell && shell.clearProjectContext) shell.clearProjectContext(); }

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function pctOf(part, total) { return total ? Math.round(part / total * 100) : 0; }

function renderStatusBar(html) {
  $("statusBox").innerHTML = html || "";
}

function refreshStatus() {
  if (!state.currentFetchingKey) {
    renderStatusBar("");
    return;
  }
  const proj = state.projects.find(p => p.key === state.currentFetchingKey);
  const projName = proj?.name || state.currentFetchingKey;
  const more = state.fetchQueue.length;
  renderStatusBar(`<div class="status-bar"><span class="spinner"></span><span>Loading ${escapeHtml(projName)} (${more} more in queue)…</span></div>`);
}
function setError(msg) {
  $("errorBox").innerHTML = msg ? `<div class="error-bar">${escapeHtml(msg)}</div>` : "";
}

async function callMcp(tool, args) {
  if (!window.cowork || !window.cowork.callMcpTool) throw new Error("Cowork MCP bridge not available");
  const res = await window.cowork.callMcpTool(tool, args);
  if (res && res.isError) { const m = (res.content && res.content[0] && res.content[0].text) || "tool error"; throw new Error(m); }
  if (res && Array.isArray(res.content)) {
    const txt = res.content.map(c => c.text || "").join("");
    try { const parsed = JSON.parse(txt); if (parsed != null) return parsed; } catch (e) {}
  }
  if (res && res.structuredContent != null) return res.structuredContent;
  if (typeof res === "string") { try { return JSON.parse(res); } catch (e) { return res; } }
  return res;
}
function normSearch(res) {
  const iss = res && res.issues;
  if (Array.isArray(iss)) return { list: iss, next: res.isLast ? undefined : res.nextPageToken };
  if (iss && Array.isArray(iss.nodes)) { const pi = iss.pageInfo || {}; return { list: iss.nodes, next: pi.hasNextPage ? pi.endCursor : undefined }; }
  return { list: [], next: undefined };
}

function issueTypeIcon(typeName) {
  const name = (typeName || "").toLowerCase();
  let cls = "task", svg;
  if (name.includes("bug")) {
    cls = "bug"; svg = `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/><path d="M2 12h4M18 12h4M12 2v4M12 18v4M5 5l3 3M16 16l3 3M5 19l3-3M16 8l3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>`;
  } else if (name.includes("story")) {
    cls = "story"; svg = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 4h14v16l-7-4-7 4z"/></svg>`;
  } else if (name.includes("epic")) {
    cls = "epic"; svg = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></svg>`;
  } else if (name.includes("sub")) {
    cls = "subtask"; svg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 5v9a3 3 0 0 0 3 3h11"/><path d="M14 12l5 5-5 5"/></svg>`;
  } else if (name.includes("improvement")) {
    cls = "improvement"; svg = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4" stroke="currentColor" stroke-width="2" fill="none"/></svg>`;
  } else if (name.includes("idea")) {
    cls = "idea"; svg = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 18h6v2H9zM12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg>`;
  } else if (name.includes("customer")) {
    cls = "customer"; svg = `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>`;
  } else {
    cls = "task"; svg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>`;
  }
  return { cls, svg };
}

function typeBadge(typeName) {
  const { cls, svg } = issueTypeIcon(typeName);
  return `<span class="tb-badge"><span class="itype ${cls}">${svg}</span>${escapeHtml(typeName)}</span>`;
}

function svgDonut(done, inProg, todo, opts) {
  const o = Object.assign({ size: 92, sw: 9 }, opts || {});
  const total = done + inProg + todo;
  const r = (o.size - o.sw) / 2;
  const c = 2 * Math.PI * r;
  const cx = o.size / 2;
  const cy = o.size / 2;

  let segs = "";
  if (total > 0) {
    const dLen = c * done / total;
    const iLen = c * inProg / total;
    const tLen = c * todo / total;
    if (done > 0) {
      segs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#16a34a" stroke-width="${o.sw}"
        stroke-dasharray="${dLen} ${c - dLen}" transform="rotate(-90 ${cx} ${cy})"/>`;
    }
    if (inProg > 0) {
      segs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2563eb" stroke-width="${o.sw}"
        stroke-dasharray="${iLen} ${c - iLen}" stroke-dashoffset="${-dLen}" transform="rotate(-90 ${cx} ${cy})"/>`;
    }
    if (todo > 0) {
      segs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#cbd5e1" stroke-width="${o.sw}"
        stroke-dasharray="${tLen} ${c - tLen}" stroke-dashoffset="${-(dLen + iLen)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    }
  }

  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const labelText = total > 0 ? `${pct}%` : "—";
  const subText = total > 0 ? `${done}/${total} done` : "no items";

  return `<div class="donut-wrap">
    <svg viewBox="0 0 ${o.size} ${o.size}" width="${o.size}" height="${o.size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f1f5f9" stroke-width="${o.sw}"/>
      ${segs}
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central"
        font-size="${Math.round(o.size * 0.26)}" font-weight="700" fill="#0b1f44">${escapeHtml(labelText)}</text>
    </svg>
    <div class="donut-sublabel">${escapeHtml(subText)}</div>
  </div>`;
}

function aggregate(issues, capped) {
  const total = { done: 0, inProgress: 0, todo: 0 };
  const byType = new Map();
  const typesPresent = new Map();
  const boardIds = new Set();

  for (const issue of issues) {
    const cat = issue?.fields?.status?.statusCategory?.key;
    const type = issue?.fields?.issuetype?.name || "Unknown";
    const bucket = cat === "done" ? "done" : cat === "indeterminate" ? "inProgress" : "todo";
    total[bucket]++;
    typesPresent.set(type, (typesPresent.get(type) || 0) + 1);

    if (!byType.has(type)) byType.set(type, { done: 0, inProgress: 0, todo: 0 });
    byType.get(type)[bucket]++;

    for (const f of SPRINT_FIELDS) {
      const v = issue?.fields?.[f];
      if (Array.isArray(v)) {
        for (const s of v) if (s?.boardId != null) boardIds.add(s.boardId);
      }
    }
  }
  return {
    total, byType,
    typesPresent: Array.from(typesPresent.entries()).sort((a, b) => b[1] - a[1]),
    boardCount: boardIds.size,
    totalIssues: issues.length,
    capped,
    fetchedAt: Date.now(),
  };
}

function findTypeData(byType, primaryName) {
  for (const [name, data] of byType) {
    if (name.toLowerCase() === primaryName.toLowerCase()) return { name, data };
  }
  return null;
}

let __nonce = 0;
function bustJql(q){
  const tag = "cb" + Date.now().toString(36) + (__nonce++).toString(36);
  const clause = ' AND (created >= "1970-01-01" OR summary ~ "' + tag + '")';
  const i = q.search(/\bORDER\s+BY\b/i);
  return i >= 0 ? (q.slice(0, i) + clause + " " + q.slice(i)) : (q + clause);
}
async function fetchProjectIssues(projectKey) {
  const all = [];
  let pageToken;
  let pages = 0;
  const fields = ["status", "issuetype", ...SPRINT_FIELDS];
  let capped = false;
  const __fpiJql = bustJql(`project = "${projectKey}" ORDER BY updated DESC`);

  do {
    const args = {
      cloudId: CLOUD_ID,
      jql: __fpiJql,
      fields,
      maxResults: PAGE_SIZE,
    };
    if (pageToken) args.nextPageToken = pageToken;
    const res = await callMcp("mcp__YOUR_CONNECTOR_ID__searchJiraIssuesUsingJql", args);
    const norm = normSearch(res);
    all.push(...norm.list);
    pages++;
    pageToken = norm.next;
    if (pages >= MAX_PAGES_PER_PROJECT && pageToken) {
      capped = true;
      break;
    }
  } while (pageToken);

  return aggregate(all, capped);
}

function enqueueFetch(projectKey, force = false) {
  if (!force && state.data.has(projectKey)) {
    renderScorecards();
    return;
  }
  if (!state.fetchQueue.includes(projectKey) && state.currentFetchingKey !== projectKey) {
    state.fetchQueue.push(projectKey);
  }
  refreshStatus();
  processQueue();
}

async function processQueue() {
  if (state.isFetching) return;
  if (state.fetchQueue.length === 0) {
    state.currentFetchingKey = null;
    refreshStatus();
    return;
  }
  state.isFetching = true;
  setError("");

  while (state.fetchQueue.length > 0) {
    const key = state.fetchQueue.shift();
    if (!state.selectedKeys.has(key)) continue;

    state.currentFetchingKey = key;
    refreshStatus();

    try {
      const data = await fetchProjectIssues(key);
      state.data.set(key, data);
    } catch (err) {
      console.error(`[fetchProjectIssues:${key}]`, err);
      const proj = state.projects.find(p => p.key === key);
      state.data.set(key, { error: err.message || String(err), totalIssues: 0 });
      setError(`Failed to load ${proj?.name || key}: ${err.message || err}`);
    }
    renderScorecards();
  }
  state.currentFetchingKey = null;
  state.isFetching = false;
  refreshStatus();
}

async function loadProjects() {
  try {
    const res = await callMcp("mcp__YOUR_CONNECTOR_ID__getVisibleJiraProjects", {
      cloudId: CLOUD_ID, action: "view", expandIssueTypes: false, maxResults: 50
    });
    const list = (res && res.values) ? res.values.slice() : [];
    list.sort((a, b) => a.name.localeCompare(b.name));
    state.projects = list;
    renderDropdown();
    updateTrigger();
    updatePickerMeta();
    if (shell && shell.reportConnection) shell.reportConnection(list.length > 0);
  } catch (err) {
    setError("Failed to load projects: " + (err.message || err));
    if (shell && shell.reportConnection) shell.reportConnection(false);
  }
}

function renderDropdown() {
  const list = $("dropdownList");
  if (!state.projects.length) {
    list.innerHTML = `<div class="dropdown-empty">No projects available.</div>`;
    return;
  }
  const term = state.searchTerm.toLowerCase();
  const filtered = term
    ? state.projects.filter(p => p.name.toLowerCase().includes(term) || p.key.toLowerCase().includes(term))
    : state.projects;

  if (!filtered.length) {
    list.innerHTML = `<div class="dropdown-empty">No matches for "${escapeHtml(state.searchTerm)}".</div>`;
    return;
  }

  list.innerHTML = filtered.map(p => {
    const active = state.selectedKeys.has(p.key);
    return `<div class="dropdown-option ${active ? "selected" : ""}" data-key="${escapeHtml(p.key)}" role="option" tabindex="0">
      <span class="opt-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      <span class="opt-name">${escapeHtml(p.name)}</span>
      <span class="opt-key">${escapeHtml(p.key)}</span>
    </div>`;
  }).join("");

  list.querySelectorAll(".dropdown-option").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      toggleProject(el.dataset.key);
    });
  });
}

function updateTrigger() {
  const label = $("dtLabel");
  const count = state.selectedKeys.size;
  if (count === 0) {
    label.textContent = "Select projects";
  } else if (count === 1) {
    const key = [...state.selectedKeys][0];
    const proj = state.projects.find(p => p.key === key);
    label.innerHTML = `${escapeHtml(proj?.name || key)}<span class="dt-pill">1</span>`;
  } else {
    label.innerHTML = `Projects selected<span class="dt-pill">${count}</span>`;
  }
}

function updatePickerMeta() {
  $("pickerMeta").textContent = `${state.selectedKeys.size} of ${state.projects.length} selected`;
}

function toggleProject(key) {
  if (state.selectedKeys.has(key)) {
    state.selectedKeys.delete(key);
    const idx = state.fetchQueue.indexOf(key);
    if (idx !== -1) state.fetchQueue.splice(idx, 1);
    refreshStatus();
  } else {
    state.selectedKeys.add(key);
    enqueueFetch(key);
  }
  const opt = root.querySelector(`.dropdown-option[data-key="${CSS.escape(key)}"]`);
  if (opt) opt.classList.toggle("selected", state.selectedKeys.has(key));
  updateTrigger();
  updatePickerMeta();
  renderScorecards();
  syncContext();
}

function renderScorecards() {
  const target = $("scorecards");
  const empty = $("emptyState");
  const keys = state.projects
    .filter(p => state.selectedKeys.has(p.key))
    .map(p => p.key);

  if (!keys.length) {
    target.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";
  target.innerHTML = keys.map(k => {
    const proj = state.projects.find(p => p.key === k);
    const data = state.data.get(k);
    return scorecardHTML(proj, data);
  }).join("");
  target.querySelectorAll(".sc-drill").forEach((b) => b.addEventListener("click", (e) => {
    e.stopPropagation();
    shell.drill(b.dataset.key, b.dataset.name, b.dataset.level);
  }));
}

const ICON_BOARD = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18"/></svg>`;
const ICON_LIST = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/></svg>`;

function scorecardHTML(project, data) {
  const head = `
    <div class="sc-head">
      <div class="sc-name-row">
        <h2 class="sc-name">${escapeHtml(project.name)}</h2>
        <span class="sc-key">${escapeHtml(project.key)}</span>
      </div>
      <div class="sc-actions">
        <button class="sc-drill" data-key="${escapeHtml(project.key)}" data-name="${escapeHtml(project.name)}" data-level="backlog">Backlog health &rarr;</button>
        <button class="sc-drill" data-key="${escapeHtml(project.key)}" data-name="${escapeHtml(project.name)}" data-level="sprint">Sprint health &rarr;</button>
      </div>
      ${data && !data.error ? `
        <div class="sc-meta-row">
          <span class="sc-meta-item">${ICON_BOARD}<strong>${data.boardCount}</strong>&nbsp;board${data.boardCount === 1 ? "" : "s"}</span>
          <span class="sc-meta-item">${ICON_LIST}<strong>${data.totalIssues}${data.capped ? "+" : ""}</strong>&nbsp;work item${data.totalIssues === 1 ? "" : "s"}</span>
          ${data.capped ? `<span class="cap-warn" title="Capped at ${MAX_ISSUES_PER_PROJECT} for performance">capped at ${MAX_ISSUES_PER_PROJECT}</span>` : ""}
        </div>
        ${data.typesPresent.length ? `<div class="type-badges">${data.typesPresent.map(([n]) => typeBadge(n)).join("")}</div>` : ""}
      ` : ""}
    </div>
  `;

  if (!data) {
    return `<article class="scorecard loading">
      ${head}
      <div class="sc-loading-row"><span class="spinner"></span> Fetching issues from Jira…</div>
    </article>`;
  }

  if (data.error) {
    return `<article class="scorecard">
      ${head}
      <div class="sc-loading-row" style="color: var(--danger);">Could not load: ${escapeHtml(data.error)}</div>
    </article>`;
  }

  const t = data.total;
  const oTotal = t.done + t.inProgress + t.todo;
  const oPctHtml = (n) => `<span class="pct">(${pctOf(n, oTotal)}%)</span>`;

  const overview = `
    <div class="sc-overview">
      ${svgDonut(t.done, t.inProgress, t.todo, { size: 110, sw: 11 })}
      <div class="sc-stats">
        <div class="stat-row"><span class="swatch done"></span><span class="label">Done</span><span class="num">${t.done}${oPctHtml(t.done)}</span></div>
        <div class="stat-row"><span class="swatch inprog"></span><span class="label">In Progress</span><span class="num">${t.inProgress}${oPctHtml(t.inProgress)}</span></div>
        <div class="stat-row"><span class="swatch todo"></span><span class="label">To Do</span><span class="num">${t.todo}${oPctHtml(t.todo)}</span></div>
      </div>
    </div>
  `;

  const types = `
    <div class="sc-types">
      ${PRIMARY_TYPES.map(pt => typeBlockHTML(pt, data.byType)).join("")}
    </div>
  `;

  return `<article class="scorecard">${head}${overview}${types}</article>`;
}

function typeBlockHTML(primary, byType) {
  const found = findTypeData(byType, primary.name);
  const counts = found ? found.data : { done: 0, inProgress: 0, todo: 0 };
  const total = counts.done + counts.inProgress + counts.todo;
  const { cls, svg } = issueTypeIcon(primary.name);
  const tPct = (n) => `<span class="pct">(${pctOf(n, total)}%)</span>`;

  const body = total === 0
    ? `<div class="tb-empty">No ${escapeHtml(primary.plural.toLowerCase())} in this project.</div>`
    : `<div class="tb-body">
        ${svgDonut(counts.done, counts.inProgress, counts.todo, { size: 76, sw: 8 })}
        <div class="tb-counts">
          <div class="tb-cnt"><span class="swatch" style="background:#16a34a;"></span><strong>${counts.done}</strong>${tPct(counts.done)}<span class="lbl">Done</span></div>
          <div class="tb-cnt"><span class="swatch" style="background:#2563eb;"></span><strong>${counts.inProgress}</strong>${tPct(counts.inProgress)}<span class="lbl">In Progress</span></div>
          <div class="tb-cnt"><span class="swatch" style="background:#cbd5e1;"></span><strong>${counts.todo}</strong>${tPct(counts.todo)}<span class="lbl">To Do</span></div>
        </div>
      </div>`;

  return `<div class="type-block">
    <div class="tb-head">
      <span class="itype ${cls}">${svg}</span>
      <span class="tb-name">${primary.plural}</span>
      <span class="tb-total">${total}</span>
    </div>
    ${body}
  </div>`;
}

const dropdownEl = $("dropdown");
const triggerEl = $("dropdownTrigger");
const panelEl = $("dropdownPanel");
const searchEl = $("searchInput");

function openDropdown() {
  panelEl.classList.add("open");
  triggerEl.classList.add("open");
  setTimeout(() => searchEl?.focus(), 0);
}
function closeDropdown() {
  panelEl.classList.remove("open");
  triggerEl.classList.remove("open");
}
triggerEl.addEventListener("click", (e) => {
  e.stopPropagation();
  if (panelEl.classList.contains("open")) closeDropdown();
  else openDropdown();
});
document.addEventListener("click", (e) => {
  const p = e.composedPath ? e.composedPath() : [];
  if (!p.includes(dropdownEl)) closeDropdown();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && panelEl.classList.contains("open")) closeDropdown();
});
searchEl.addEventListener("input", (e) => {
  state.searchTerm = e.target.value;
  renderDropdown();
});
searchEl.addEventListener("click", (e) => e.stopPropagation());

$("selectAllBtn").addEventListener("click", () => {
  for (const p of state.projects) {
    if (!state.selectedKeys.has(p.key)) {
      state.selectedKeys.add(p.key);
      enqueueFetch(p.key);
    }
  }
  renderDropdown();
  updateTrigger();
  updatePickerMeta();
  renderScorecards();
  syncContext();
});

$("clearBtn").addEventListener("click", () => {
  state.selectedKeys.clear();
  state.fetchQueue.length = 0;
  refreshStatus();
  renderDropdown();
  updateTrigger();
  updatePickerMeta();
  renderScorecards();
  syncContext();
});

async function reloadAll(){
  const btn = $("refreshBtn"); if (btn) btn.disabled = true;
  state.data.clear();
  await loadProjects();
  for (const k of [...state.selectedKeys]) if (!state.projects.some(p => p.key === k)) state.selectedKeys.delete(k);
  updateTrigger(); updatePickerMeta();
  state.fetchQueue.length = 0;
  for (const k of state.selectedKeys) state.fetchQueue.push(k);
  refreshStatus();
  renderScorecards();
  processQueue();
  syncContext();
  if (btn) btn.disabled = false;
}
$("refreshBtn").addEventListener("click", () => reloadAll());

  let __loaded = false;
  async function ensureLoaded(){
    if (__loaded) return; __loaded = true;
    await loadProjects();
    renderScorecards();   // shows the "pick one or more projects" empty state; no auto-selection
    syncContext();
  }
  let __activatedOnce = false;
  function refetchSelected(){
    state.data.clear(); state.fetchQueue.length = 0;
    for (const k of state.selectedKeys) state.fetchQueue.push(k);
    refreshStatus(); renderScorecards(); processQueue();
  }
  return {
    // Re-fetch fresh data on every re-activation of the Portfolio tab.
    activate: async () => { if (!__activatedOnce){ __activatedOnce = true; await ensureLoaded(); } else { refetchSelected(); } },
    getFirstSelected: () => { const p = firstSelectedProject(); return p ? { key: p.key, name: p.name } : null; },
    refresh: () => reloadAll(),
    deactivate: () => {}
  };
}


function createBacklogView(root, host, shell){
  "use strict";
  const SERVER = "mcp__YOUR_CONNECTOR_ID__";
  const T = {
    res: SERVER+"getAccessibleAtlassianResources",
    projects: SERVER+"getVisibleJiraProjects",
    search: SERVER+"searchJiraIssuesUsingJql",
    issue: SERVER+"getJiraIssue"
  };
  const LS="jira_backlog_health_v2";
  const CYCLE_CAP=60, PAGE_CAP=600, ROWS=12;

  const $=s=>root.querySelector(s);
  const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
  const days=ms=>ms/86400000;
  const fmtD=d=>d==null||isNaN(d)?"–":(d<10?d.toFixed(1):Math.round(d).toString());
  const round1=v=>v==null?null:Math.round(v*10)/10;
  const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const getCss=v=>getComputedStyle(host).getPropertyValue(v).trim();
  const sum=a=>a.reduce((x,y)=>x+y,0);
  const mean=a=>a.length?sum(a)/a.length:null;
  const median=a=>{if(!a.length)return null;const s=[...a].sort((x,y)=>x-y);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;};
  const fmtDate=d=>d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});

  async function mcp(name,args){
    const r=await window.cowork.callMcpTool(name,args);
    if(r&&r.isError){const m=(r.content&&r.content[0]&&r.content[0].text)||"tool error";throw new Error(name.replace(SERVER,"")+": "+m);}
    let data=r?r.structuredContent:null;
    if(data==null&&r&&r.content&&r.content[0]&&r.content[0].text){try{data=JSON.parse(r.content[0].text);}catch(e){throw new Error("parse error: "+name.replace(SERVER,""));}}
    return data;
  }

  // ---- icons & meta ----
  const ICO={
    bookmark:'<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>',
    bug:'<line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="6.3" y1="6.3" x2="17.7" y2="17.7"/><line x1="6.3" y1="17.7" x2="17.7" y2="6.3"/>',
    epic:'<polygon points="13 2 4 14 11 14 10 22 20 9 13 9 13 2"/>',
    improve:'<polyline points="3 17 9 11 13 15 21 6"/><polyline points="15 6 21 6 21 12"/>',
    task:'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
    sub:'<rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/>',
    dot:'<circle cx="12" cy="12" r="6"/>'
  };
  function tsvg(inner,sz){return `<svg width="${sz||15}" height="${sz||15}" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;}
  function typeMeta(name){
    const n=(name||"").toLowerCase();
    if(n.includes("story")) return {c:getCss("--type-story"),i:ICO.bookmark};
    if(n.includes("bug")) return {c:getCss("--type-bug"),i:ICO.bug};
    if(n.includes("epic")) return {c:getCss("--type-epic"),i:ICO.epic};
    if(n.includes("improv")) return {c:getCss("--type-improve"),i:ICO.improve};
    if(n.includes("sub")) return {c:getCss("--type-sub"),i:ICO.sub};
    if(n.includes("task")) return {c:getCss("--type-task"),i:ICO.task};
    return {c:getCss("--type-other"),i:ICO.dot};
  }
  const TRI_UP='<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 6l7 12H5z"/></svg>';
  const TRI_DN='<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 18L5 6h14z"/></svg>';
  const EQ='<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="9" width="14" height="2.4" rx="1"/><rect x="5" y="13" width="14" height="2.4" rx="1"/></svg>';
  function prioMeta(name){
    const n=(name||"").toLowerCase();
    if(/(highest|block|critical)/.test(n)) return {cls:"p-crit",ic:TRI_UP};
    if(/(high|major)/.test(n)) return {cls:"p-high",ic:TRI_UP};
    if(/(medium|normal)/.test(n)) return {cls:"p-med",ic:EQ};
    if(/(lowest|trivial)/.test(n)) return {cls:"p-lowest",ic:TRI_DN};
    if(/(low|minor)/.test(n)) return {cls:"p-low",ic:TRI_DN};
    return {cls:"p-med",ic:EQ};
  }
  function statusMeta(f){
    const k=f.status&&f.status.statusCategory?f.status.statusCategory.key:"new";
    return k==="done"?"s-done":k==="indeterminate"?"s-prog":"s-todo";
  }
  const AVA=["#2f6fed","#1aa37a","#8270db","#e9a100","#e2483d","#0aa2c0","#d6499b"];
  function initials(name){const p=(name||"").trim().split(/\s+/);return ((p[0]||"")[0]||"?").toUpperCase()+((p[1]||"")[0]||"").toUpperCase();}
  function avaColor(name){let h=0;for(const ch of (name||""))h=(h*31+ch.charCodeAt(0))>>>0;return AVA[h%AVA.length];}

  function orderTypeNames(names){
    const pri=["epic","story","task","bug","improvement"];const isSub=n=>/sub-?task/i.test(n);
    return [...new Set((names||[]).filter(Boolean))].sort((a,b)=>{
      const sa=isSub(a)?1:0,sb=isSub(b)?1:0;if(sa!==sb)return sa-sb;
      const ra=(()=>{const i=pri.findIndex(p=>a.toLowerCase().includes(p));return i<0?50:i;})();
      const rb=(()=>{const i=pri.findIndex(p=>b.toLowerCase().includes(p));return i<0?50:i;})();
      return ra!==rb?ra-rb:a.localeCompare(b);
    });
  }
  const parseTypes=s=>{try{return JSON.parse(s||"[]");}catch(e){return [];}};
  const pluralize=(name,n)=> n===1 ? name : (/y$/i.test(name)? name.replace(/y$/i,"ies") : name+"s");

  // ---- state ----
  let cloudId="YOUR_CLOUD_ID";
  let duration=30, projectKey=null, projectName=null, supportedTypes=[];
  let loadToken=0, workItems=[], page=0, pendingProjectKey=null, __inited=false;
  let selectedVersions=new Set(), versionProject=null;
  const charts={};
  const saveState=()=>{try{localStorage.setItem(LS,JSON.stringify({projectKey,duration}));}catch(e){}};
  const loadState=()=>{try{return JSON.parse(localStorage.getItem(LS)||"{}");}catch(e){return {};}};
  const periodLabel=()=>({14:"last 2 weeks",30:"last month",90:"last 3 months",180:"last 6 months"})[duration];

  // ---- data ----
  let __nonce=0;
  function bustJql(q){
    const tag="cb"+Date.now().toString(36)+(__nonce++).toString(36);
    const clause=' AND (created >= "1970-01-01" OR summary ~ "'+tag+'")';
    const i=q.search(/\bORDER\s+BY\b/i);
    return i>=0 ? (q.slice(0,i)+clause+" "+q.slice(i)) : (q+clause);
  }
  async function searchAll(jql,fields,cap){
    jql=bustJql(jql);
    let nodes=[],token=null,pages=0;
    do{
      const args={cloudId,jql,fields,maxResults:100};if(token)args.nextPageToken=token;
      const data=await mcp(T.search,args);
      const iss=(data&&data.issues)||{};
      nodes=nodes.concat(iss.nodes||[]);
      const pi=iss.pageInfo||{};token=(pi.hasNextPage&&pi.endCursor)?pi.endCursor:null;pages++;
    }while(token&&nodes.length<cap&&pages<12);
    return nodes;
  }
  async function inProgressStart(key,catMap){
    const data=await mcp(T.issue,{cloudId,issueIdOrKey:key,fields:["status"],expand:"changelog"});
    const node=data&&data.issues&&data.issues.nodes&&data.issues.nodes[0];
    const hist=(node&&node.changelog&&node.changelog.histories)||[];
    hist.sort((a,b)=>new Date(a.created)-new Date(b.created));
    for(const h of hist)for(const it of (h.items||[]))if(it.field==="status"&&catMap[it.toString]==="indeterminate")return h.created;
    for(const h of hist)for(const it of (h.items||[])){if(it.field!=="status")continue;const c=catMap[it.toString];if(!c||c!=="new")return h.created;}
    return null;
  }
  const bucketCat=k=>k==="done"?"done":k==="indeterminate"?"prog":"todo";

  function analyze(created,resolved,supported){
    const types={};const ensure=n=>types[n]||(types[n]={name:n,created:0,resolved:0,todo:0,prog:0,done:0,leads:[],cycles:[]});
    (supported||[]).forEach(ensure);
    const catMap={};
    const note=f=>{if(f&&f.status&&f.status.statusCategory)catMap[f.status.name]=f.status.statusCategory.key;};
    created.forEach(i=>{const f=i.fields||{};note(f);const t=ensure(f.issuetype?f.issuetype.name:"Unknown");t.created++;t[bucketCat(f.status&&f.status.statusCategory?f.status.statusCategory.key:"")]++;});
    resolved.forEach(i=>{const f=i.fields||{};note(f);const t=ensure(f.issuetype?f.issuetype.name:"Unknown");t.resolved++;if(f.created&&f.resolutiondate){const lt=days(new Date(f.resolutiondate)-new Date(f.created));if(lt>=0)t.leads.push(lt);}});
    return {types,catMap};
  }

  function buildTrend(created,resolved){
    const now=new Date();const start=new Date(now.getTime()-duration*86400000);
    const weekly=duration>35;const step=(weekly?7:1)*86400000;
    const bks=[];for(let t=start.getTime();t<now.getTime();t+=step)bks.push(new Date(t));bks.push(now);
    const cC=bks.map(b=>created.filter(i=>i.fields.created&&new Date(i.fields.created)<=b).length);
    const cR=bks.map(b=>resolved.filter(i=>i.fields.resolutiondate&&new Date(i.fields.resolutiondate)<=b).length);
    return {labels:bks.map(fmtDate),created:cC,resolved:cR};
  }

  // ---- bar value labels plugin ----
  const barLabels={id:"barLabels",afterDatasetsDraw(chart){
    const ctx=chart.ctx;ctx.save();ctx.font="700 12px -apple-system,'Segoe UI',Roboto,sans-serif";ctx.textAlign="center";ctx.textBaseline="bottom";

  function destroyCharts(){Object.keys(charts).forEach(k=>{try{charts[k].destroy();}catch(e){}delete charts[k];});}

    plugins:{legend:{position:"top",align:"end",labels:{boxWidth:12,boxHeight:12,color:"#0c1424",font:{size:12,weight:"600"}}},
      tooltip:{backgroundColor:"#172b4d",padding:10,cornerRadius:8}}};}

  // ---- render ----
  function render(model){
    destroyCharts();
    const created=model._created, resolved=model._resolved;
    const names=orderTypeNames(Object.keys(model.types).concat(supportedTypes));
    const tl=names.map(n=>model.types[n]||{name:n,created:0,resolved:0,todo:0,prog:0,done:0,leads:[],cycles:[]});
    const totC=sum(tl.map(t=>t.created)), totR=sum(tl.map(t=>t.resolved));
    const todoN=sum(tl.map(t=>t.todo)), progN=sum(tl.map(t=>t.prog)), doneN=sum(tl.map(t=>t.done));
    const net=totC-totR, completion=totC?Math.round(100*doneN/totC):0;
    const compColor=completion>=70?"var(--good)":completion>=40?"var(--warn)":"var(--bad)";

    // union work items (dedupe by key)
    const seen={};workItems=[];
    [...created,...resolved].forEach(i=>{if(!seen[i.key]){seen[i.key]=1;workItems.push(i);}});
    const catRank={indeterminate:0,new:1,done:2};
    const prioRank=n=>{n=(n||"").toLowerCase();if(/(highest|block|critical)/.test(n))return 0;if(/(high|major)/.test(n))return 1;if(/(medium|normal)/.test(n))return 2;if(/(low|minor)/.test(n))return 3;return 4;};
    workItems.sort((a,b)=>{
      const ka=(a.fields.status&&a.fields.status.statusCategory?a.fields.status.statusCategory.key:"new");
      const kb=(b.fields.status&&b.fields.status.statusCategory?b.fields.status.statusCategory.key:"new");
      return (catRank[ka]-catRank[kb])||(prioRank(a.fields.priority&&a.fields.priority.name)-prioRank(b.fields.priority&&b.fields.priority.name))||a.key.localeCompare(b.key);
    });

    // chips: union counts by type
    const unionByType={};workItems.forEach(i=>{const n=i.fields.issuetype?i.fields.issuetype.name:"Unknown";unionByType[n]=(unionByType[n]||0)+1;});
    const chipNames=orderTypeNames(names);

    const startD=fmtDate(new Date(Date.now()-duration*86400000));
    const healthTxt=net>0?"Backlog growing":net<0?"Backlog shrinking":"Backlog balanced";
    const healthColor=net>0?"var(--bad)":net<0?"var(--good)":"var(--muted)";
    const scale=Math.max(totC,totR,1);
    const noteCls=net<0?"good":net>0?"bad":"";
    const noteTxt=net<0?`Backlog shrank by <b>${-net}</b> — resolved (${totR}) outpaced created (${totC}).`
      :net>0?`Backlog grew by <b>${net}</b> — created (${totC}) outpaced resolved (${totR}).`
      :`Balanced — created and resolved both <b>${totC}</b>.`;

    const root=el("div");

    // top cards
    const cards=el("div","cards");

      <div class="card hero">

      </div>

        <div class="completion-body">
          <div class="donut-wrap"><canvas id="c_donut"></canvas>
            <div class="donut-center"><div class="n" style="color:${compColor}">${completion}%</div><div class="l">done</div></div>
          </div>
          <div class="legend">
            <div class="li"><span class="dot" style="background:var(--done)"></span>Done <b>${doneN}</b></div>
            <div class="li"><span class="dot" style="background:var(--prog)"></span>In progress <b>${progN}</b></div>
            <div class="li"><span class="dot" style="background:var(--todo)"></span>To do <b>${todoN}</b></div>
          </div>
        </div>
        <div class="csub">${doneN} of ${totC} created items now done</div>
      </div>
      <div class="card">
        <div class="ctitle">Flow health</div>
        <div class="cexp">Created vs. resolved in the ${periodLabel()} (all types, by date).</div>
        <div class="health-status" style="color:${healthColor}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">${net>0?'<polyline points="17 7 17 17 7 17"/><line x1="17" y1="17" x2="5" y2="5"/>':net<0?'<polyline points="17 17 17 7 7 7"/><line x1="17" y1="7" x2="5" y2="19"/>':'<line x1="5" y1="9" x2="19" y2="9"/><line x1="5" y1="15" x2="19" y2="15"/>'}</svg>
          ${healthTxt}
        </div>
        <div class="meter"><div class="mh"><span>Created (inflow)</span><b>${totC}</b></div><div class="track"><i style="width:${Math.round(100*totC/scale)}%;background:var(--accent)"></i></div></div>
        <div class="meter"><div class="mh"><span>Resolved (throughput)</span><b>${totR}</b></div><div class="track"><i style="width:${Math.round(100*totR/scale)}%;background:var(--done)"></i></div></div>
        <div class="csub" style="margin-top:auto">Net flow <b style="color:${healthColor}">${net>0?"+":""}${net}</b> this period</div>
      </div>
      <div class="card">
        <div class="ctitle">Throughput</div>
        <div class="bignum">${totR}</div>
        <div class="bignum-sub">work items resolved · ${periodLabel()}</div>

      return `<div class="chip"><div class="tile" style="background:${m.c}">${tsvg(m.i,16)}</div><div><div class="cn">${c}</div><div class="cl">${esc(n)}</div></div></div>`;}).join("");
    root.appendChild(chips);

    // trend (navy)

    pt.innerHTML=`<h3>Backlog flow</h3><div class="desc">Cumulative work items created vs. resolved across the ${periodLabel()}.</div><div class="chart-box"><canvas id="c_trend"></canvas></div>`;
    root.appendChild(pt);

    pv.innerHTML=`<h3>Release progress by Fix Version</h3>

      <div id="verControl"></div>
      <div id="verCards" class="ver-grid"></div>`;
    root.appendChild(pv);

    // created vs resolved bars

        tooltip:{backgroundColor:"#172b4d",padding:9,cornerRadius:8,callbacks:{label:c=>` ${c.label}: ${c.parsed} (${totC?Math.round(100*c.parsed/totC):0}%)`}}}}});

        {label:"Created",data:tr.created,borderColor:"#6ea8ff",backgroundColor:"rgba(110,168,255,.16)",fill:true,tension:.25,borderWidth:2.5,pointRadius:0,pointHoverRadius:4},
        {label:"Resolved",data:tr.resolved,borderColor:"#36d27a",backgroundColor:"rgba(54,210,122,.14)",fill:true,tension:.25,borderWidth:2.5,pointRadius:0,pointHoverRadius:4}
      ]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:300},interaction:{mode:"index",intersect:false},
        scales:{x:{grid:{color:"rgba(255,255,255,.07)"},ticks:{color:"#9fb0cd",font:{size:11},maxTicksLimit:8}},
          y:{beginAtZero:true,grid:{color:"rgba(255,255,255,.08)"},ticks:{color:"#9fb0cd",precision:0,font:{size:11}}}},
        plugins:{legend:{position:"top",align:"end",labels:{boxWidth:12,boxHeight:12,color:"#dce6ff",font:{size:12}}},
          tooltip:{backgroundColor:"#0c1730",padding:10,cornerRadius:8}}}});

    charts.flow=new Chart($("#c_flow"),{type:"bar",
      data:{labels,datasets:[
        {label:"Created",data:tl.map(t=>t.created),backgroundColor:getCss("--accent"),borderRadius:5,maxBarThickness:46},
        {label:"Resolved",data:tl.map(t=>t.resolved),backgroundColor:getCss("--done"),borderRadius:5,maxBarThickness:46}
      ]},options:barOpts(),plugins:[barLabels]});

  }

  function renderTimeTable(tl,ready){
    const rows=tl.map(t=>{const m=typeMeta(t.name);
      return `<tr><td><span style="display:inline-flex;align-items:center;gap:7px;font-weight:600"><span class="dot" style="background:${m.c}"></span>${esc(t.name)}</span></td>
        <td>${t.resolved}</td><td>${fmtD(mean(t.leads))}</td><td>${fmtD(median(t.leads))}</td>

  async function computeCycle(model,tl){
    const token=loadToken;
    const items=(model._resolved||[]).filter(i=>i.fields&&i.fields.resolutiondate)
      .sort((a,b)=>new Date(b.fields.resolutiondate)-new Date(a.fields.resolutiondate)).slice(0,CYCLE_CAP);
    const byName={};tl.forEach(t=>{t.cycles=[];byName[t.name]=t;});
    let done=0,ok=0;const prog=$("#cycProg");
    for(const it of items){
      if(token!==loadToken)return;const f=it.fields||{};
      try{const s=await inProgressStart(it.key,model.catMap);if(s){const c=days(new Date(f.resolutiondate)-new Date(s));if(c>=0){const t=byName[f.issuetype?f.issuetype.name:"Unknown"];if(t){t.cycles.push(c);ok++;}}}}catch(e){}
      done++;if(prog)prog.textContent=`Cycle time: analysed ${done}/${items.length} resolved issues…`;
    }
    if(token!==loadToken)return;
    if(charts.time){charts.time.data.datasets[1].data=tl.map(t=>round1(mean(t.cycles)));charts.time.update();}
    renderTimeTable(tl,true);
    const capped=(model._resolved||[]).filter(i=>i.fields&&i.fields.resolutiondate).length>CYCLE_CAP;
    if(prog)prog.textContent=`Cycle time from issue history of ${ok} resolved issue(s)`+(capped?` (most recent ${CYCLE_CAP} of ${(model._resolved||[]).length}).`:".");
  }

  // ---- orchestration ----
  async function loadDashboard(){

    setState(`<div class="panel"><div class="state"><div class="spinner"></div><div style="font-weight:700;color:var(--ink)">Loading ${esc(projectName)}…</div><div style="margin-top:4px">Fetching created &amp; resolved work items for the ${periodLabel()}.</div></div></div>`);
    try{
      const fields=["issuetype","created","resolutiondate","status","priority","summary","assignee"];
      // Run sequentially, NOT in parallel: concurrent calls to the same MCP tool can
      // collide in the read cache and return each other's results (e.g. resolved getting
      // the created set). Sequential awaits guarantee distinct, correct results per query.
      // Sub-tasks are excluded from all calculations (standardIssueTypes() = non-subtask types),
      // with a defensive client-side filter on the subtask flag as a safety net.
      const noSub=i=>!(i.fields&&i.fields.issuetype&&i.fields.issuetype.subtask);
      const created=(await searchAll(`project = "${projectKey}" AND issuetype in standardIssueTypes() AND created >= -${duration}d ORDER BY created DESC`,fields,PAGE_CAP)).filter(noSub);
      if(token!==loadToken)return;
      const resolved=(await searchAll(`project = "${projectKey}" AND issuetype in standardIssueTypes() AND resolutiondate >= -${duration}d ORDER BY resolutiondate DESC`,fields,PAGE_CAP)).filter(noSub);
      if(token!==loadToken)return;
      // Fix Version progress — whole release scope (not period-limited). Only Story, Task, Bug, Epic
      // (no sub-tasks, no other types like Improvement/Idea), enforced in JQL and client-side.
      const verTypes=new Set(["story","task","bug","epic"]);
      const verIssues=(await searchAll(`project = "${projectKey}" AND issuetype in ("Story","Task","Bug","Epic") AND fixVersion is not EMPTY ORDER BY fixVersion ASC`,["status","fixVersions","issuetype"],PAGE_CAP))
        .filter(i=>i.fields&&i.fields.issuetype&&verTypes.has((i.fields.issuetype.name||"").toLowerCase()));
      if(token!==loadToken)return;
      const vstats=computeVersionStats(verIssues);
      const vnames=vstats.map(v=>v.name);
      if(versionProject!==projectKey){ selectedVersions=new Set(vnames); versionProject=projectKey; }
      else { selectedVersions=new Set([...selectedVersions].filter(n=>vnames.includes(n))); if(!selectedVersions.size) selectedVersions=new Set(vnames); }
      const model=analyze(created,resolved,supportedTypes);model._created=created;model._resolved=resolved;model._versionStats=vstats;
      render(model);
    }catch(e){
      if(token!==loadToken)return;
      setState(`<div class="panel"><div class="err"><b>Couldn't load Jira data.</b><br>${esc(e.message||String(e))}<br><br>Try Refresh, pick another project, or check the Jira connector is still authorised.</div></div>`);
    }
  }

  async function activate(params){

  return { activate, refresh:()=>{ if(projectKey) loadDashboard(); }, deactivate:()=>{ loadToken++; } };
}

function createSprintView(root, host, shell){

const CLOUD_ID = "YOUR_CLOUD_ID";
const SITE_HOST = "your-company.atlassian.net";
const SPRINT_FIELDS = ["customfield_10007", "customfield_10020"];
const PAGE_SIZE = 15;

const state = {
  projects: [],
  selectedProjectKey: null,
  issues: [],
  sprints: [],
  selectedSprintId: null,
  currentPage: 1,
};

const $ = (id) => root.getElementById(id);
let pendingProjectKey = null, __inited = false;
function notifyContext(key){ const p = state.projects.find(x => x.key === key); if (shell && shell.setProjectContext) shell.setProjectContext(key, p ? p.name : key); }
function setNote(msg){ const n = $("noteBox"); if (n) n.innerHTML = msg ? `<div class="info">${msg}</div>` : ""; }
function selectProject(key){

    return;

  setNote("");
  state.selectedProjectKey = key; $("projectSelect").value = key; state.currentPage = 1; notifyContext(key); loadIssuesForProject(key);
}
const errBox = () => $("errBox");

function setError(msg) {
  errBox().innerHTML = msg ? `<div class="error">${msg}</div>` : "";
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

async function callMcp(tool, args) {
  if (!window.cowork || !window.cowork.callMcpTool) throw new Error("Cowork MCP bridge not available");
  const res = await window.cowork.callMcpTool(tool, args);
  if (res && res.isError) { const m = (res.content && res.content[0] && res.content[0].text) || "tool error"; throw new Error(m); }
  if (res && res.content && Array.isArray(res.content)) {
    const txt = res.content.map(c => c.text || "").join("");
    try { const parsed = JSON.parse(txt); if (parsed != null) return parsed; } catch (e) {}
  }
  if (res && res.structuredContent != null) return res.structuredContent;
  if (typeof res === "string") { try { return JSON.parse(res); } catch (e) { return res; } }
  return res;
}
function normSearch(res) {
  const iss = res && res.issues;
  if (Array.isArray(iss)) return { list: iss, next: res.isLast ? undefined : res.nextPageToken };
  if (iss && Array.isArray(iss.nodes)) { const pi = iss.pageInfo || {}; return { list: iss.nodes, next: pi.hasNextPage ? pi.endCursor : undefined }; }
  return { list: [], next: undefined };
}

async function loadProjects() {

    });

  ).join("");
