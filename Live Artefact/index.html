let __nonce = 0;
function bustJql(q){
  const tag = "cb" + Date.now().toString(36) + (__nonce++).toString(36);
  const clause = ' AND (created >= "1970-01-01" OR summary ~ "' + tag + '")';
  const i = q.search(/\bORDER\s+BY\b/i);
  return i >= 0 ? (q.slice(0, i) + clause + " " + q.slice(i)) : (q + clause);
}
async function loadIssuesForProject(projectKey) {
  state.issues = []; state.sprints = []; state.selectedSprintId = null; state.currentPage = 1;
  $("sprintSelect").innerHTML = `<option value="">Loading sprints…</option>`;
  $("content").innerHTML = `<div class="empty"><span class="spinner"></span> Loading issues for <strong>${escapeHtml(projectKey)}</strong>…</div>`;
  setError("");
  try {
    const all = [];
    let pageToken; let pages = 0;
    const fields = ["summary", "status", "issuetype", "assignee", "project", "priority", "resolutiondate", ...SPRINT_FIELDS];
    const __sprJql = bustJql(`project = ${projectKey} AND sprint is not EMPTY ORDER BY updated DESC`);
    do {
      const args = { cloudId: CLOUD_ID, jql: __sprJql, fields, maxResults: 100 };
      if (pageToken) args.nextPageToken = pageToken;
      const res = await callMcp("mcp__YOUR_CONNECTOR_ID__searchJiraIssuesUsingJql", args);
      const norm = normSearch(res);
      all.push(...norm.list);
      pageToken = norm.next;
      if (++pages > 20) break;
    } while (pageToken);
    state.issues = all;
    indexSprints();
    renderSprintSelect();
    renderContent();
  } catch (err) {
    setError("Failed to load issues: " + (err.message || err));
    $("content").innerHTML = "";
  }
}

function getSprintField(issue) {
  for (const f of SPRINT_FIELDS) if (issue.fields && Array.isArray(issue.fields[f])) return issue.fields[f];
  return [];
}

function indexSprints() {
  const map = new Map();
  for (const issue of state.issues) {
    for (const s of getSprintField(issue)) {
      if (!map.has(s.id)) map.set(s.id, { ...s, issues: [] });
      map.get(s.id).issues.push(issue);
    }
  }
  const arr = Array.from(map.values());
  const order = { active: 0, future: 1, closed: 2 };
  arr.sort((a, b) => {
    if (order[a.state] !== order[b.state]) return order[a.state] - order[b.state];
    if (a.state === "closed") return new Date(b.endDate || 0) - new Date(a.endDate || 0);
    return new Date(a.startDate || 0) - new Date(b.startDate || 0);
  });
  state.sprints = arr;
  if (arr.length) {
    const active = arr.find(s => s.state === "active");
    state.selectedSprintId = (active || arr[0]).id;
  }
}

function renderSprintSelect() {
  const sel = $("sprintSelect");
  if (!state.sprints.length) { sel.innerHTML = `<option value="">No sprints</option>`; return; }
  const groups = state.sprints.reduce((acc, s) => { (acc[s.state] = acc[s.state] || []).push(s); return acc; }, {});
  const labels = { active: "Active", future: "Future", closed: "Completed" };
  let html = "";
  for (const k of ["active", "future", "closed"]) {
    if (groups[k]?.length) {
      html += `<optgroup label="${labels[k]} (${groups[k].length})">`;
      for (const s of groups[k]) html += `<option value="${s.id}">${escapeHtml(s.name)}</option>`;
      html += `</optgroup>`;
    }
  }
  sel.innerHTML = html;
  if (state.selectedSprintId) sel.value = String(state.selectedSprintId);
}

function getStatusCategoryKey(i) { return i?.fields?.status?.statusCategory?.key || "new"; }
function isDone(i) { return getStatusCategoryKey(i) === "done"; }
function isInProgress(i) { return getStatusCategoryKey(i) === "indeterminate"; }
function fmtDateShort(s) { if (!s) return "—"; return new Date(s).toLocaleDateString(undefined, { month: "short", day: "numeric" }); }
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }

function firstLastInitials(displayName) {
  if (!displayName) return "?";
  const parts = displayName.trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return "?";
  if (parts.length === 1) return parts[0][0].toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function statusPill(issue) {
  const cat = getStatusCategoryKey(issue);
  const label = issue?.fields?.status?.name || cat;
  const cls = cat === "done" ? "done" : cat === "indeterminate" ? "inprogress" : "todo";
  return `<span class="pill ${cls}">${escapeHtml(label)}</span>`;
}

const PRIORITY_ICONS = {
  blocker: `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8.6 2h6.8L22 8.6v6.8L15.4 22H8.6L2 15.4V8.6L8.6 2z"/><path d="M7 12h10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg>`,
  highest: `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2c1 4 5 5 5 10a5 5 0 11-10 0c0-2 1-3 2-4-1 3 1 4 2 3 0-3-1-5 1-9z"/></svg>`,
  critical: `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2L1 21h22L12 2z"/><rect x="11" y="9" width="2" height="6" fill="#fff"/><circle cx="12" cy="17.5" r="1.2" fill="#fff"/></svg>`,
  high: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 13 12 7 18 13"/><polyline points="6 19 12 13 18 19"/></svg>`,
  major: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 15 12 9 18 15"/></svg>`,
  medium: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" aria-hidden="true"><line x1="5" y1="9" x2="19" y2="9"/><line x1="5" y1="15" x2="19" y2="15"/></svg>`,
  low: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>`,
  minor: `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 8h12l-6 8z"/></svg>`,
  lowest: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 5 12 11 18 5"/><polyline points="6 11 12 17 18 11"/></svg>`,
  trivial: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" aria-hidden="true"><line x1="6" y1="12" x2="18" y2="12"/></svg>`,
  unknown: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 015 0c0 1.5-2.5 2-2.5 4"/><circle cx="12" cy="17" r="0.7" fill="currentColor"/></svg>`,
};

function priorityKey(name) {
  if (!name) return "unknown";
  const lc = name.toLowerCase();
  const known = ["blocker","highest","critical","high","major","medium","low","minor","lowest","trivial"];
  return known.includes(lc) ? lc : "unknown";
}

function priorityCell(priority) {
  const name = priority?.name || "None";
  const key = priorityKey(priority?.name);
  const icon = PRIORITY_ICONS[key] || PRIORITY_ICONS.unknown;
  return `<span class="prio ${key}" title="${escapeHtml(name)} priority">
    <span class="prio-ico">${icon}</span>
    <span class="prio-label">${escapeHtml(name)}</span>
  </span>`;
}

function issueTypeIcon(typeName) {
  const name = (typeName || "").toLowerCase();
  let cls = "task", svg = "";
  if (name.includes("bug")) {
    cls = "bug"; svg = `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/><path d="M2 12h4M18 12h4M12 2v4M12 18v4M5 5l3 3M16 16l3 3M5 19l3-3M16 8l3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>`;
  } else if (name.includes("story")) {
    cls = "story"; svg = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 4h14v16l-7-4-7 4z"/></svg>`;
  } else if (name.includes("epic")) {
    cls = "epic"; svg = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></svg>`;
  } else if (name.includes("sub")) {
    cls = "subtask"; svg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 5v9a3 3 0 0 0 3 3h11"/><path d="M14 12l5 5-5 5"/></svg>`;
  } else if (name.includes("improvement")) {
    cls = "improvement"; svg = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4" stroke="currentColor" stroke-width="2" fill="none"/></svg>`;
  } else if (name.includes("idea")) {
    cls = "idea"; svg = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 18h6v2H9zM12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg>`;
  } else if (name.includes("customer")) {
    cls = "customer"; svg = `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>`;
  } else {
    cls = "task"; svg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>`;
  }
  return `<span class="itype ${cls}" title="${escapeHtml(typeName || "")}">${svg}</span>`;
}

function assigneeCell(assignee) {
  if (!assignee) {
    return `<span class="assignee un">
      <span class="avatar unassigned">—</span>
      <span class="assignee-name">Unassigned</span>
    </span>`;
  }
  const name = assignee.displayName || "Unknown";
  return `<span class="assignee">
    <span class="avatar" title="${escapeHtml(name)}">${escapeHtml(firstLastInitials(name))}</span>
    <span class="assignee-name">${escapeHtml(name)}</span>
  </span>`;
}

function pluralize(name, count) {
  if (count === 1) return name;
  if (/[^aeiou]y$/i.test(name)) return name.slice(0, -1) + "ies";
  if (/(s|x|z|ch|sh)$/i.test(name)) return name + "es";
  return name + "s";
}

function getIssueTypeBreakdown(issues) {
  const counts = new Map();
  for (const it of issues) {
    const name = it?.fields?.issuetype?.name || "Unknown";
    counts.set(name, (counts.get(name) || 0) + 1);
  }
  return Array.from(counts.entries())
    .map(([name, count]) => ({ name, count }))
    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
}

function backlogSummaryHtml(issues) {
  if (!issues.length) return "";
  const breakdown = getIssueTypeBreakdown(issues);
  const total = issues.length;
  return `
    <div>
      <div class="backlog-eyebrow">Sprint Backlog &middot; ${total} item${total===1?"":"s"} by Type</div>
      <div class="backlog-summary">
        ${breakdown.map(({ name, count }) => {
          const label = pluralize(name, count);
          return `<div class="backlog-card" title="${count} ${escapeHtml(label)} in this sprint">
            ${issueTypeIcon(name)}
            <div class="bs-meta">
              <div class="bs-num">${count}</div>
              <div class="bs-label">${escapeHtml(label)}</div>
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>
  `;
}

/* === Sprint Burndown chart (active sprint only) ===
 *
 * "Today" is positioned at the actual fractional time-of-day in the local
 * timezone:
 *   todayFrac = (now − sprintStartOfDay) / 1 day
 */
function burndownSection(sprint, issues) {
  if (sprint.state !== "active") return "";
  if (!sprint.startDate || !sprint.endDate) return "";
  const totalItems = issues.length;
  if (totalItems === 0) return "";

  const startMs = startOfDay(sprint.startDate).getTime();
  const endMs   = startOfDay(sprint.endDate).getTime();
  const totalDuration = Math.max(1, (endMs - startMs) / 86400000);
  const nowMs = Date.now();
  const todayFrac = Math.max(0, Math.min(totalDuration, (nowMs - startMs) / 86400000));
  const doneCount = issues.filter(isDone).length;

  const resolutions = [];
  let withDate = 0;
  for (const issue of issues) {
    if (!isDone(issue)) continue;
    const rd = issue?.fields?.resolutiondate;
    if (!rd) continue;
    const x = (new Date(rd).getTime() - startMs) / 86400000;
    resolutions.push(Math.max(0, Math.min(todayFrac, x)));
    withDate++;
  }
  const orphan = doneCount - withDate;
  for (let i = 0; i < orphan; i++) resolutions.push(todayFrac);
  resolutions.sort((a, b) => a - b);

  const points = [{ x: 0, y: totalItems }];
  let remaining = totalItems;
  for (const r of resolutions) {
    points.push({ x: r, y: remaining });
    remaining -= 1;
    points.push({ x: r, y: remaining });
  }
  if (todayFrac > points[points.length - 1].x || resolutions.length === 0) {
    points.push({ x: todayFrac, y: remaining });
  }

  const startDate = new Date(startMs);
  const endDate = new Date(endMs);
  const remainingItems = totalItems - doneCount;
  const chartHtml = burndownSVG({
    start: startDate, end: endDate, totalDuration, totalItems, todayFrac, doneCount, points
  });

  const startLabel = startDate.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  const endLabel = endDate.toLocaleDateString(undefined, { month: "short", day: "numeric" });

  return `
    <section class="burndown" aria-label="Sprint burndown">
      <div class="bd-head">
        <div class="bd-titles">
          <div class="bd-title">Sprint Burndown <span class="bd-title-note">(work items count)</span></div>
          <div class="bd-subtitle">${startLabel} → ${endLabel} · ${remainingItems} of ${totalItems} remaining</div>
        </div>
        <div class="bd-legend">
          <span class="bd-legend-item"><span class="bd-line bd-actual"></span>Actual</span>
          <span class="bd-legend-item"><span class="bd-line bd-ideal"></span>Ideal</span>
          <span class="bd-legend-item"><span class="bd-line bd-trend"></span>Trend</span>
          <span class="bd-legend-item"><span class="bd-marker bd-today"></span>Today</span>
        </div>
      </div>
      <div class="bd-chart">${chartHtml}</div>
    </section>
  `;
}

function burndownSVG({ start, end, totalDuration, totalItems, todayFrac, doneCount, points }) {
  const W = 1200, H = 320;
  const padL = 56, padR = 28, padT = 24, padB = 46;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  const xFor = (frac) => padL + (frac / totalDuration) * plotW;
  const yFor = (items) => padT + (1 - items / totalItems) * plotH;

  const todayX = xFor(todayFrac);
  const todayRemaining = totalItems - doneCount;

  const idealPath = `M ${xFor(0)} ${yFor(totalItems)} L ${xFor(totalDuration)} ${yFor(0)}`;

  let actualPath = `M ${xFor(points[0].x)} ${yFor(points[0].y)}`;
  for (let i = 1; i < points.length; i++) {
    actualPath += ` L ${xFor(points[i].x)} ${yFor(points[i].y)}`;
  }

  let trendPath = "";
  if (todayFrac > 0) {
    const ratePerDay = doneCount / todayFrac;
    const remainingDaysLeft = totalDuration - todayFrac;
    const projected = Math.max(0, todayRemaining - ratePerDay * remainingDaysLeft);
    trendPath = `M ${todayX} ${yFor(todayRemaining)} L ${xFor(totalDuration)} ${yFor(projected)}`;
  }

  const totalDaysCeil = Math.ceil(totalDuration);
  const tickIdxs = new Set();
  tickIdxs.add(0);
  tickIdxs.add(totalDaysCeil);
  const targetTicks = totalDaysCeil <= 7 ? totalDaysCeil + 1 : 7;
  if (targetTicks > 2 && totalDaysCeil > 0) {
    for (let i = 1; i < targetTicks - 1; i++) {
      tickIdxs.add(Math.round(i * totalDaysCeil / (targetTicks - 1)));
    }
  }
  const ticks = Array.from(tickIdxs).filter(t => t >= 0 && t <= totalDaysCeil).sort((a, b) => a - b);
  const xTicks = ticks.map((dayIdx) => {
    const date = new Date(start.getTime() + dayIdx * 86400000);
    const wd = date.toLocaleDateString(undefined, { weekday: "short" });
    const day = date.getDate();
    return `<g><line x1="${xFor(dayIdx)}" y1="${padT + plotH}" x2="${xFor(dayIdx)}" y2="${padT + plotH + 4}" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text x="${xFor(dayIdx)}" y="${padT + plotH + 22}" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">${wd} ${day}</text></g>`;
  }).join("");

  const yLabels = `
    <text x="${padL - 10}" y="${yFor(totalItems)}" text-anchor="end" dominant-baseline="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-weight="600">${totalItems}</text>
    <text x="${padL - 10}" y="${yFor(0)}" text-anchor="end" dominant-baseline="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-weight="600">0</text>
  `;

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: auto; display: block; max-height: 320px;">
    <defs>
      <pattern id="bd-hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
      </pattern>
    </defs>
    <rect x="${padL}" y="${padT}" width="${Math.max(0, todayX - padL)}" height="${plotH}" fill="url(#bd-hatch)"/>
    <line x1="${padL}" y1="${yFor(totalItems)}" x2="${padL + plotW}" y2="${yFor(totalItems)}" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="${padL}" y1="${yFor(0)}" x2="${padL + plotW}" y2="${yFor(0)}" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    ${yLabels}
    <line x1="${todayX}" y1="${padT - 4}" x2="${todayX}" y2="${padT + plotH + 4}" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <path d="${idealPath}" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6 5" fill="none" opacity="0.7"/>
    ${trendPath ? `<path d="${trendPath}" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 4" fill="none" opacity="0.55"/>` : ""}
    <path d="${actualPath}" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${todayX}" cy="${yFor(todayRemaining)}" r="5" fill="#fbbf24" stroke="#0b1f44" stroke-width="2"/>
    ${xTicks}
  </svg>`;
}

function paginationHtml(total, page) {
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  const safePage = Math.min(Math.max(1, page), totalPages);
  const start = total === 0 ? 0 : (safePage - 1) * PAGE_SIZE + 1;
  const end = Math.min(total, safePage * PAGE_SIZE);

  const pages = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (safePage > 3) pages.push("…");
    const lo = Math.max(2, safePage - 1);
    const hi = Math.min(totalPages - 1, safePage + 1);
    for (let i = lo; i <= hi; i++) pages.push(i);
    if (safePage < totalPages - 2) pages.push("…");
    pages.push(totalPages);
  }

  const numHtml = pages.map(p => {
    if (p === "…") return `<span class="page-ellipsis">…</span>`;
    return `<button class="page-btn ${p === safePage ? "active" : ""}" data-page="${p}" ${p === safePage ? "disabled" : ""}>${p}</button>`;
  }).join("");

  return `
    <div class="pagination">
      <div class="info">Showing <strong>${start}–${end}</strong> of <strong>${total}</strong> work item${total===1?"":"s"}</div>
      <div class="page-controls">
        <button class="page-btn icon" data-page="prev" ${safePage <= 1 ? "disabled" : ""} title="Previous page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        ${numHtml}
        <button class="page-btn icon" data-page="next" ${safePage >= totalPages ? "disabled" : ""} title="Next page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  `;
}

function attachPaginationHandlers(total) {
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  root.querySelectorAll(".pagination .page-btn[data-page]").forEach(btn => {
    btn.addEventListener("click", () => {
      const v = btn.getAttribute("data-page");
      if (v === "prev") state.currentPage = Math.max(1, state.currentPage - 1);
      else if (v === "next") state.currentPage = Math.min(totalPages, state.currentPage + 1);
      else state.currentPage = parseInt(v, 10) || 1;
      renderContent();
      const t = root.querySelector(".table-card");
      if (t) t.scrollIntoView({ behavior: "smooth", block: "nearest" });
    });
  });
}

function renderContent() {
  if (!state.sprints.length) {
    $("content").innerHTML = `<div class="empty">This project has no issues assigned to a sprint yet. Pick another project, or check that it uses a Scrum board.</div>`;
    return;
  }
  const sprint = state.sprints.find(s => String(s.id) === String(state.selectedSprintId)) || state.sprints[0];
  const issues = sprint.issues || [];
  const total = issues.length;
  const done = issues.filter(isDone).length;
  const inProgress = issues.filter(isInProgress).length;
  const todo = total - done - inProgress;
  const pctDone = total ? Math.round((done / total) * 100) : 0;

  const closed = state.sprints.filter(s => s.state === "closed");
  const closedCounts = closed.map(s => s.issues.filter(isDone).length);
  const avgCompleted = closedCounts.length ? closedCounts.reduce((a, b) => a + b, 0) / closedCounts.length : null;

  let healthHtml = "";
  let pctTime = 0, remaining = 0, totalDays = 0;
  if (sprint.startDate && sprint.endDate) {
    const start = new Date(sprint.startDate);
    const end = new Date(sprint.endDate);
    const now = new Date();
    totalDays = Math.max(1, daysBetween(start, end));
    /* Derive remaining from elapsed so the two always sum to totalDays.
     * Previously we computed remaining as round(now → end), which double-rounded
     * against round(start → now) and could give e.g. elapsed=1 + remaining=5
     * for a 5-day sprint (sum 6) — the user-reported "5 days remaining" bug
     * on day 2 of a 5-day sprint. */
    const elapsed = Math.min(totalDays, Math.max(0, daysBetween(start, now)));
    remaining = Math.max(0, totalDays - elapsed);
    pctTime = Math.min(100, Math.round((elapsed / totalDays) * 100));
  }
  let healthStatus = "muted", healthLabel = "Not started", timeBarClass = "";
  if (sprint.state === "active") {
    const drift = pctTime - pctDone;
    if (drift > 25) { healthStatus = "danger"; healthLabel = "At Risk"; timeBarClass = "danger"; }
    else if (drift > 10) { healthStatus = "warn"; healthLabel = "Watch"; timeBarClass = "warn"; }
    else { healthStatus = "good"; healthLabel = "On Track"; }
  } else if (sprint.state === "closed") {
    healthStatus = pctDone === 100 ? "good" : "warn";
    healthLabel = pctDone === 100 ? "Sprint Closed · Complete" : "Sprint Closed";
  } else {
    healthStatus = "muted"; healthLabel = "Future Sprint";
  }
  const healthIcons = {
    good: `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>`,
    warn: `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.86l-8.5 14.7A2 2 0 003.5 22h17a2 2 0 001.7-3.4l-8.5-14.7a2 2 0 00-3.4 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    danger: `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
    muted: `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  };
  const healthIcon = healthIcons[healthStatus];

  if (sprint.startDate && sprint.endDate) {
    healthHtml = `
      <div class="health-status ${healthStatus}">${healthIcon}<span>${escapeHtml(healthLabel)}</span></div>
      <div class="health-meta">${remaining} day${remaining===1?"":"s"} remaining · ${totalDays}-day sprint</div>
      <div class="bars">
        <div class="bar-row">
          <div class="lbl"><span>Work completed</span><strong>${pctDone}%</strong></div>
          <div class="bar"><span class="work" style="width:${pctDone}%"></span></div>
        </div>
        <div class="bar-row">
          <div class="lbl"><span>Time elapsed</span><strong>${pctTime}%</strong></div>
          <div class="bar"><span class="time ${timeBarClass}" style="width:${pctTime}%"></span></div>
        </div>
      </div>
      <div class="health-foot">${fmtDateShort(sprint.startDate)} → ${fmtDateShort(sprint.endDate)}</div>
    `;
  } else {
    healthHtml = `
      <div class="health-status muted">${healthIcons.muted}<span>No dates set</span></div>
      <div class="health-meta">This sprint does not have a start or end date configured.</div>
    `;
  }

  let velHtml;
  if (sprint.state === "active") {
    if (avgCompleted == null) {
      velHtml = `<div class="velocity-num">—</div>
        <div class="velocity-unit">no historical sprints yet</div>
        <div class="velocity-note">Need at least one closed sprint in this project to estimate an average.</div>`;
    } else {
      const projected = Math.min(total, Math.max(done, Math.round(avgCompleted)));
      const shortfall = Math.max(0, total - projected);
      const noteCls = shortfall === 0 ? "good" : shortfall > total * 0.3 ? "warn" : "";
      const verdict = total === 0
        ? `No issues in this sprint.`
        : shortfall === 0
          ? `On pace to clear all <strong>${total}</strong> issues based on an average of <strong>${avgCompleted.toFixed(1)}</strong> issues/sprint.`
          : `Likely shortfall of <strong>${shortfall}</strong> issue${shortfall===1?"":"s"} based on an average of <strong>${avgCompleted.toFixed(1)}</strong> issues/sprint.`;
      velHtml = `<div class="velocity-num">${avgCompleted.toFixed(1)}</div>
        <div class="velocity-unit">per sprint, n=${closedCounts.length}</div>
        <div class="velocity-note ${noteCls}">${verdict}</div>`;
    }
  } else if (sprint.state === "closed") {
    velHtml = `<div class="velocity-num">${done}<span style="color:var(--text-muted); font-size: 22px;"> / ${total}</span></div>
      <div class="velocity-unit">final completion</div>
      ${avgCompleted != null ? `<div class="velocity-note">Project average: <strong>${avgCompleted.toFixed(1)}</strong> issues completed per sprint, n=${closedCounts.length}.</div>` : ""}`;
  } else {
    velHtml = `<div class="velocity-num">${avgCompleted != null ? Math.round(avgCompleted) : "—"}</div>
      <div class="velocity-unit">forecast issues to complete</div>
      <div class="velocity-note">Sprint hasn't started. Forecast based on historical average${avgCompleted != null ? ` of ${avgCompleted.toFixed(1)} issues/sprint.` : "."}</div>`;
  }

  const stateLabel = sprint.state === "active" ? "Active Sprint" : sprint.state === "closed" ? "Completed Sprint" : "Future Sprint";
  const heroDates = (sprint.startDate && sprint.endDate)
    ? `${fmtDateShort(sprint.startDate)} – ${fmtDateShort(sprint.endDate)}`
    : "Dates not set";
  const heroTimeIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
  const heroClockIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const heroDaysItem = sprint.state === "active" ? `<span class="item">${heroClockIcon}${remaining} day${remaining===1?"":"s"} left</span>` :
                       sprint.state === "future" && sprint.startDate ? `<span class="item">${heroClockIcon}Starts ${fmtDateShort(sprint.startDate)}</span>` :
                       sprint.state === "closed" && sprint.endDate ? `<span class="item">${heroClockIcon}Ended ${fmtDateShort(sprint.endDate)}</span>` : "";

  const trimmedGoal = (sprint.goal || "").trim();
  const goalHtml = trimmedGoal
    ? `<div class="goal" title="${escapeHtml(trimmedGoal)}"><span class="goal-label">Goal:</span>${escapeHtml(trimmedGoal)}</div>`
    : `<div class="goal empty"><span class="goal-label">Goal:</span><em>No goal set for this sprint</em></div>`;

  const projectName = state.projects.find(p => p.key === state.selectedProjectKey)?.name || state.selectedProjectKey;

  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (state.currentPage > totalPages) state.currentPage = totalPages;
  if (state.currentPage < 1) state.currentPage = 1;
  const pageStart = (state.currentPage - 1) * PAGE_SIZE;
  const pageIssues = issues.slice(pageStart, pageStart + PAGE_SIZE);

  $("content").innerHTML = `
    <div class="kpi-grid">
      <div class="hero">
        <span class="hero-tag ${sprint.state}"><span class="pulse"></span>${escapeHtml(stateLabel)}</span>
        <h2 title="${escapeHtml(sprint.name)}">${escapeHtml(sprint.name)}</h2>
        ${goalHtml}
        <div class="hero-meta">
          <span class="item">${heroTimeIcon}${heroDates}</span>
          ${heroDaysItem}
        </div>
      </div>

      <div class="card">
        <div class="card-title">Completion</div>
        <div class="donut-row">
          <div class="donut-stack">
            <div class="donut-canvas-wrap">
              <canvas id="donut"></canvas>
              <div class="donut-center">
                <div class="pct">${pctDone}%</div>
              </div>
            </div>
            <div class="donut-frac">${done}/${total} done</div>
          </div>
          <div class="legend">
            <div class="item"><span class="dot" style="background:#16a34a"></span>Done · <strong>${done}</strong></div>
            <div class="item"><span class="dot" style="background:#2563eb"></span>In progress · <strong>${inProgress}</strong></div>
            <div class="item"><span class="dot" style="background:#cbd5e1"></span>To do · <strong>${todo}</strong></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Sprint Health</div>
        ${healthHtml}
      </div>

      <div class="card">
        <div class="card-title">Average Work Completed</div>
        ${velHtml}
      </div>
    </div>

    ${backlogSummaryHtml(issues)}

    ${burndownSection(sprint, issues)}

    <div class="section-head">
      <h2>${escapeHtml(projectName)} · Work Items <span class="count">${total} item${total===1?"":"s"}</span></h2>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th style="width:110px;">Key</th>
            <th style="width:150px;">Priority</th>
            <th style="width:60px;">Type</th>
            <th>Title</th>
            <th style="width:140px;">Status</th>
            <th style="width:240px;">Assignee</th>
          </tr>
        </thead>
        <tbody>
          ${pageIssues.length === 0 ? `<tr><td colspan="6" style="text-align:center; padding: 32px; color: var(--text-muted);">No work items in this sprint.</td></tr>` :
            pageIssues.map(it => {
              const f = it.fields || {};
              const link = `https://${SITE_HOST}/browse/${escapeHtml(it.key)}`;
              return `<tr>
                <td><a href="${link}" target="_blank" rel="noopener" class="issue-key">${escapeHtml(it.key)}</a></td>
                <td>${priorityCell(f.priority)}</td>
                <td>${issueTypeIcon(f.issuetype?.name)}</td>
                <td><span class="issue-title">${escapeHtml(f.summary || "")}</span></td>
                <td>${statusPill(it)}</td>
                <td>${assigneeCell(f.assignee)}</td>
              </tr>`;
            }).join("")}
        </tbody>
      </table>
      ${total > 0 ? paginationHtml(total, state.currentPage) : ""}
    </div>
  `;

  if (total > 0) attachPaginationHandlers(total);

  const ctx = root.getElementById("donut");
  if (ctx && window.Chart) {
    new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: ["Done", "In Progress", "To Do"],
        datasets: [{
          data: total === 0 ? [0, 0, 1] : [done, inProgress, todo],
          backgroundColor: total === 0 ? ["#e2e8f0", "#e2e8f0", "#e2e8f0"] : ["#16a34a", "#2563eb", "#cbd5e1"],
          borderWidth: 0,
          hoverOffset: 4,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: true, cutout: "72%",
        plugins: { legend: { display: false }, tooltip: { enabled: total > 0 } },
        animation: { animateRotate: true, duration: 600 },
      },
    });
  }
}

$("projectSelect").addEventListener("change", (e) => { state.selectedProjectKey = e.target.value; state.currentPage = 1; setNote(""); notifyContext(e.target.value); loadIssuesForProject(state.selectedProjectKey); });
$("sprintSelect").addEventListener("change", (e) => { state.selectedSprintId = e.target.value; state.currentPage = 1; renderContent(); });
$("refreshBtn").addEventListener("click", async () => { setError(""); await loadProjects(); });

  async function activate(params){
    if (params && params.projectKey) pendingProjectKey = params.projectKey;
    // Every activation does the SAME full reload as the Refresh button (load projects ->
    // pick the carried project -> fetch its sprints), so navigating in always matches Refresh.
    __inited = true;
    setError("");
    await loadProjects();
  }
  return { activate, refresh: async () => { setError(""); await loadProjects(); }, deactivate: () => {} };
}


(function(){
  const LEVELS = ["portfolio","backlog","sprint"];
  const CLOUD_ID = "YOUR_CLOUD_ID";
  const GVP = "mcp__YOUR_CONNECTOR_ID__getVisibleJiraProjects";
  const context = { key:null, name:null };
  let currentLevel = "portfolio";

  const navBtns = Array.from(document.querySelectorAll("#levelnav button"));
  const connBadge = document.getElementById("connBadge");
  const connLabel = document.getElementById("connLabel");
  const connReconnect = document.getElementById("connReconnect");

  const shell = {
    drill(key, name, level){ context.key = key; context.name = name; show(level, { projectKey:key }); },
    setProjectContext(key, name){ context.key = key; context.name = name || key; },
    clearProjectContext(){ context.key = null; context.name = null; },
    reportConnection(ok){ setConn(ok ? "connected" : "disconnected"); if (ok){ const bb = document.getElementById("bridgeBanner"); if (bb) bb.remove(); } },
    goTo(level){ show(level); }
  };

  function build(level, factory){
    const host = document.getElementById("view-" + level);
    const root = host.attachShadow({ mode:"open" });
    root.appendChild(document.getElementById("tpl-" + level).content.cloneNode(true));
    return factory(root, host, shell);
  }
  const views = {
    portfolio: build("portfolio", createPortfolioView),
    backlog:   build("backlog",   createBacklogView),
    sprint:    build("sprint",    createSprintView)
  };

  function show(level, params){
    // Stop the outgoing view's background work so it doesn't hog the shared call-queue.
    if (currentLevel && currentLevel !== level && views[currentLevel] && views[currentLevel].deactivate) views[currentLevel].deactivate();
    LEVELS.forEach(l => { document.getElementById("view-" + l).hidden = (l !== level); });
    currentLevel = level;
    navBtns.forEach(b => b.classList.toggle("active", b.dataset.level === level));
    let p = params;
    if (!p && level !== "portfolio" && context.key) p = { projectKey: context.key };
    views[level].activate(p);
  }
  navBtns.forEach(b => b.addEventListener("click", () => show(b.dataset.level)));

  // ---- connection badge + bridge handling ----
  function bridgeReady(){ return !!(window.cowork && window.cowork.callMcpTool); }
  function setConn(state){
    connBadge.setAttribute("data-state", state);
    connLabel.textContent = state === "connected" ? "Connected" : state === "checking" ? "Checking…" : "Disconnected";
    connReconnect.hidden = (state !== "disconnected");
  }
  // No separate probe call (a maxResults:1 probe was polluting the shared read-cache so
  // Portfolio's real load returned only 1 project). Connection status is derived from
  // Portfolio's own getVisibleJiraProjects load via shell.reportConnection().
  function recheckConnection(){
    setConn("checking");
    if (!bridgeReady()){ setConn("disconnected"); return; }
    if (views.portfolio && views.portfolio.refresh) views.portfolio.refresh();
  }
  function showBridgeBanner(){
    if (document.getElementById("bridgeBanner")) return;
    const b = document.createElement("div");
    b.id = "bridgeBanner";
    b.style.cssText = "max-width:1320px;margin:14px auto 0;padding:13px 16px;border-radius:12px;background:#fef3c7;border:1px solid #fde68a;color:#7a5d00;font-size:13px;line-height:1.55;font-weight:500;";
    b.innerHTML = "<b>Can't reach the Jira connector.</b> This dashboard needs the Cowork \u2194 Jira bridge, which only exists when it runs as a <b>live artifact inside Cowork</b>. Open it from the artifacts panel in the Cowork sidebar (not the raw HTML file), and make sure your Atlassian / Jira connector is authorized.";
    const body = document.querySelector(".app-body");
    body.parentNode.insertBefore(b, body);
  }
  connReconnect.addEventListener("click", () => {
    if (typeof window.sendPrompt === "function"){
      window.sendPrompt("My Atlassian Jira connector for the Ultimate Jira Projects Dashboard looks disconnected. Please help me reconnect / re-authorize it.");
    } else {
      showBridgeBanner();
    }
    recheckConnection();
  });

  // Serialize ALL connector calls app-wide. The source dashboards warn that concurrent
  // calls to the same MCP tool collide in the read cache and return each other's results.
  // In the combined app Portfolio auto-loads its searches on startup, so opening the Sprint
  // tab fired searchJiraIssuesUsingJql WHILE Portfolio's calls were in flight -> Sprint got a
  // colliding/empty result and showed "no sprints". One-at-a-time removes the race entirely.
  function installSerialization(){
    if (window.__mcpSerialized) return;
    if (!(window.cowork && window.cowork.callMcpTool)) return;
    window.__mcpSerialized = true;
    const orig = window.cowork.callMcpTool.bind(window.cowork);
    let chain = Promise.resolve();
    window.cowork.callMcpTool = function(name, args){
      const run = () => orig(name, args);
      const p = chain.then(run, run);
      chain = p.then(() => {}, () => {});
      return p;
    };
  }
  function bootstrap(){
    if (bridgeReady()){ installSerialization(); setConn("checking"); show("portfolio"); return; }
    let waited = 0;
    const iv = setInterval(() => {
      waited += 200;
      if (bridgeReady()){ clearInterval(iv); installSerialization(); const bb = document.getElementById("bridgeBanner"); if (bb) bb.remove(); setConn("checking"); show("portfolio"); }
      else if (waited >= 12000){ clearInterval(iv); setConn("disconnected"); show("portfolio"); showBridgeBanner(); }
    }, 200);
  }
  bootstrap();
})();
